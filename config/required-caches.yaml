# required-caches.yaml
# Defines the Gemini caches that must be active for the pipeline to function.
# The cache monitor workflow (n8n-cache-monitor.json) checks these on a 90-minute schedule.

caches:
  - name: pipeline-kb
    display_name: "Pipeline Knowledge Base"
    description: "Core knowledge base containing all project documentation, research, and reference material."
    ttl_minutes: 120
    criticality: critical
    source_pattern: "docs/*.md, ARCHITECTURE.md, GTG1002_ANALYSIS.md"
    rebuild_command: "scripts/rebuild-cache.sh pipeline-kb"

  - name: pipeline-deliverables
    display_name: "Pipeline Deliverables"
    description: "Cache of all completed deliverables, reports, and schemas for cross-reference by agents."
    ttl_minutes: 120
    criticality: critical
    source_pattern: "schemas/*.json, reports/*.md, security/*.md"
    rebuild_command: "scripts/rebuild-cache.sh pipeline-deliverables"

  - name: brain-context
    display_name: "Brain Damage Prevention Context Store"
    description: "Dynamic MCP cache for offloading Claude Code session context. Stores compressed summaries of long-running sessions via store_context tool. Prevents context overflow ('brain damage') in sessions exceeding ~50K tokens."
    ttl_minutes: 1440
    criticality: important
    source_pattern: "dynamic (populated via MCP store_context calls)"
    rebuild_command: "N/A — dynamic cache, rebuilt on demand by agents"
    notes: "Unlike pipeline-kb and pipeline-deliverables, this cache is written to by agents during execution, not rebuilt from static files. Cache key format: {task_id}-{session_id}-{block_name}"

# TTL notes:
# - Gemini caches have a maximum TTL of 1440 minutes (24 hours).
# - The cache monitor runs every 90 minutes. Setting TTL to 120 minutes ensures
#   caches are checked at least once before expiry.
# - If a cache is expiring within 30 minutes at check time, it will be refreshed.

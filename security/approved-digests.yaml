# approved-digests.yaml
# Pinned Docker image digests for MCP servers used in the pipeline.
# All MCP servers requiring system access must be pulled by digest, never by tag.
# See security/threat-model.md (Supply Chain Drift) and security/rbac-config.md.
#
# Format:
#   server_name: Human-readable name of the MCP server
#   image: Docker image reference (without tag)
#   digest: SHA256 digest of the approved image
#   last_verified: Date the digest was last verified against the upstream source
#   notes: Any relevant context
#
# To verify a digest:
#   docker inspect --format='{{index .RepoDigests 0}}' <image>
#
# To update after review:
#   1. Pull the new image and inspect its digest
#   2. Review the changelog for security-relevant changes
#   3. Update the digest and last_verified date below
#   4. Commit with a signed commit: git commit -S -m "security: update <server> digest"


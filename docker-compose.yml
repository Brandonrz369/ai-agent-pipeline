version: "3.9"

services:
  # Shared backend for Distributed DLQ and Worker Registry
  redis:
    image: redis:7-alpine
    container_name: pipeline-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: .
      target: production
    image: ai-agent-pipeline:latest
    container_name: pipeline

    ports:
      - "3847:3847"

    environment:
      - NODE_ENV=production
      - ANTIGRAVITY_URL=${ANTIGRAVITY_URL:-http://host.docker.internal:8080}

    env_file:
      - .env

    # Persistent storage for dead-letter queue
    volumes:
      - pipeline-data:/home/pipeline/.openclaw

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3847/health || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3

    restart: unless-stopped

    # Allow container to reach host services (e.g. Antigravity proxy)
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pipeline-data:
    driver: local
  redis-data:
    driver: local
